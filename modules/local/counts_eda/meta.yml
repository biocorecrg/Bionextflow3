name: "counts_eda"
description: Using DESeq2, generates DESeq2 and VST normalised counts, raw counts, PCA data, variance and sample clustering matrices for exploratory data analysis.
keywords:
  - deseq2
  - pca
  - sample_clustering
  - vst
  - rnaseq
  - normalisation
tools:
  - deseq2:
      description: |
        Estimate variance-mean dependence in count data from high-throughput sequencing assays
        and test for differential expression based on a model using the negative binomial distribution.
      homepage: https://bioconductor.org/packages/release/bioc/html/DESeq2.html
      documentation: https://bioconductor.org/packages/devel/bioc/vignettes/DESeq2/inst/doc/DESeq2.html
      doi: 10.18129/B9.bioc.DESeq2
      citation: |
        Love MI, Huber W, Anders S. Moderated estimation of fold change and dispersion for RNA-seq data with DESeq2. Genome Biol. 2014;15(12):550. doi: 10.1186/s13059-014-0550-8. PMID: 25516281; PMCID: PMC4302049.
      licence:
        - "LGPL (>= 3)"
      identifier: biocmanager:DESeq2
  - ggplot2:
      description: |
        A system for 'declaratively' creating graphics, based on "The Grammar of Graphics".
        You provide the data, tell ggplot2 how to map variables to aesthetics, what graphical primitives to use,
        and it takes care of the details.
      homepage: https://ggplot2.tidyverse.org/
      documentation: https://ggplot2.tidyverse.org/reference/index.html
      doi: ""
      citation: |
        H. Wickham. ggplot2: Elegant Graphics for Data Analysis. Springer-Verlag New York, 2016.
  - r:
      description: |
        R is a free software environment for statistical computing and graphics.
      homepage: https://www.r-project.org/
      documentation: https://cran.r-project.org/doc/manuals/r-release/
      doi: ""
      citation: |
        R Core Team (2020). R: A language and environment for statistical computing. R Foundation for Statistical Computing, Vienna, Austria. https://www.R-project.org/
      licence:
        - "GPL-2+"
      identifier: cran:R

input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'all' ]
    - input_files:
        type: file
        description: Count files produced by STAR (ReadsPerGene.out.tab) or Salmon (quant.sf) plus tx2gene if using Salmon workflow
        pattern: "*.{tab,sf}"
  - desc:
      type: file
      description: Tab-separated sample description file with at least a 'sample' column and one condition column
      pattern: "*.{txt,tsv,csv}"
  - dgenes:
      type: file
      description: Gene description file mapping gene IDs to gene names/biotypes
      pattern: "*.{txt,tsv}"
  - wtype:
      type: string
      description: Workflow type, either 'star' or 'salmon'
  - extrapars:
      type: string
      description: Extra parameters passed to the multiqc_pca.R script (e.g. -assay, -min, -pcnum, -genes, -gsea)
output:
  data:
    - - "*.tsv":
          type: file
          description: PCA data TSV files (one per component comparison)
          pattern: "*_data.tsv"
          ontologies: []
  variance:
    - - "*.tsv":
          type: file
          description: Variance explained TSV file
          pattern: "*_variance.tsv"
          ontologies: []
  norm_counts:
    - - "norm_counts.genes":
          type: file
          description: DESeq2/VST normalised counts
          pattern: "norm_counts.genes"
          ontologies: []
  raw_counts:
    - - "raw_counts.genes":
          type: file
          description: Raw counts table
          pattern: "raw_counts.genes"
          ontologies: []
  sample_clustering:
    - - "*.tsv":
          type: file
          description: Sample clustering distance matrix
          pattern: "*Sample_Clustering_matrix.tsv"
          ontologies: []
  vst_genes_boxplot:
    - - "*.png":
          type: file
          description: VST normalised counts boxplot (optional)
          pattern: "_vst*boxplot.png"
          optional: true
          ontologies: []
  norm_genes_boxplot:
    - - "*.png":
          type: file
          description: Log2 DESeq2 normalised counts boxplot (optional)
          pattern: "_log2_deseq_norm*boxplot.png"
          optional: true
          ontologies: []
  batch_vst_genes_boxplot:
    - - "*.png":
          type: file
          description: Batch-corrected VST normalised counts boxplot (optional)
          pattern: "batch_vst*boxplot.png"
          optional: true
          ontologies: []
  batch_norm_genes_boxplot:
    - - "*.png":
          type: file
          description: Batch-corrected log2 DESeq2 normalised counts boxplot (optional)
          pattern: "batch_log2_deseq_norm*boxplot.png"
          optional: true
          ontologies: []
  gsea:
    - - "gsea*.{txt,cls}":
          type: file
          description: GSEA files (optional)
          pattern: "*gsea"
          optional: true
          ontologies: []
  versions_counts_eda:
    - - ${task.process}:
          type: string
          description: The process the versions were collected from
      - deseq2:
          type: string
          description: The tool name
      - "Rscript -e \"cat(as.character(packageVersion('DESeq2')))\"":
          type: string
          description: The command used to generate the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The process the versions were collected from
      - deseq2:
          type: string
          description: The tool name
      - "Rscript -e \"cat(as.character(packageVersion('DESeq2')))\"":
          type: string
          description: The command used to generate the version of the tool
authors:
  - "@biocorecrg"
