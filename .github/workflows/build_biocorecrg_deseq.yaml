name: Publish DESeq Docker Image

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
    paths:
      - "modules/local/multiqc_pca/Dockerfile"

jobs:
  build_and_publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/biocorecrg_deseq
          tags: |
            type=semver,pattern={{version}}                                                        # v1.2.3 → 1.2.3
            type=ref,event=tag                                                                     # v1.2.3 → v1.2.3
            type=raw,value=latest,enable=${{ !startsWith(github.ref, 'refs/tags/') }}             # no tag → latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./modules/local/multiqc_pca/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}